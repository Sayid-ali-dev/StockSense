<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title> StockSense </title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap " rel="stylesheet"/>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:#1a1f2e;
            --surface: #232838;
            --border: #2e3548;
            --accent: #e8c97a;
            --accent-dim:  #e8c97a15;
            --red:#e87a7a;
            --red-dim: #e87a7a15;
            --text: #f0ede8;
            --muted:  #6b7280;
            --font-mono:  'Space Mono', monospace;
            --font-display: 'Syne', sans-serif;
        }

        body{
            background: var(--bg);
            color:var(--text);
            font-family: var(--font-mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: none;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
        }

        header {
            margin-bottom: 3rem;
            text-align: left;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
        }

        .tagline {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0.85rem 1rem;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;

        }
        button:hover { opacity: 0.85; }
        button:active {transform: scale(0.97);}
        button:disabled {opacity:0.4; cursor: not-allowed;}

        .result {
            display: none;
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            animation: fadIn 0.45s ease;
        }

        .result.up {
        background: var(--accent-dim);
        border-color: var(--accent);
        }

        .result.down {
        background: var(--red-dim);
        border-color: var(--red);
        }

        @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
        }

        .result-ticker {
        font-size: 0.7rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.5rem;
        }

        .result-direction {
        font-family: var(--font-display);
        font-size: 3rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 0.75rem;
        }

        .result.up .result-direction { color: var(--accent); }
        .result.down .result-direction { color: var(--red); }

        .result-confidence {
        font-size: 0.8rem;
        color: var(--muted);
        letter-spacing: 1px;
        }

        .result-confidence span {
        color: var(--text);
        font-weight: 700;
        }

        .error {
        display: none;
        color: var(--red);
        font-size: 0.8rem;
        margin-top: 1rem;
        letter-spacing: 1px;
        }

        .loading {
        display: none;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 1rem;
        animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
        }

        footer {
        margin-top: 2rem;
        font-size: 0.7rem;
        color: var(--muted);
        letter-spacing: 1px;
        text-align: left;
        }

    </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">Stock<span>Sense</span></div>
      <div class="tagline">ML-powered market direction predictor</div>
    </header>

    <div class="card">
      <div class="input-group">
        <input type="text" id="ticker" placeholder="Enter ticker — AAPL" maxlength="10"/>
        <button id="predictBtn" onclick="predict()">PREDICT</button>
      </div>

      <div class="loading" id="loading">ANALYZING MARKET DATA...</div>

      <div class="result" id="result">
        <div class="result-ticker" id="resultTicker"></div>
        <div class="result-direction" id="resultDirection"></div>
        <div class="result-confidence" id="resultConfidence"></div>
      </div>

      <div class="error" id="error"></div>
    </div>

    <footer>MODEL: RANDOM FOREST &nbsp;|&nbsp; DATA: YAHOO FINANCE &nbsp;|&nbsp; BUILT WITH FASTAPI + DOCKER</footer>
  </div>
</body>

<script>
    async function predict() {
        const ticker = document.getElementById('ticker').value.trim();
        if (!ticker) return;

        const btn = document.getElementById('predictBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const error = document.getElementById('error');

        btn.disabled = true;
        loading.style.display = 'block';
        result.style.display = 'none';
        error.style.display = 'none';

        try {
            const response = await fetch('/predict', {
                method:'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ticker})
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.detail || 'Prediction failed');

            document.getElementById('resultTicker').textContent = data.ticker;
            document.getElementById('resultDirection').textContent = data.prediction;
            document.getElementById('resultConfidence').innerHTML =
                `CONFIDENCE <span>${data.confidence}</span>`;
            
            result.className = 'result ' + data.prediction.toLowerCase();
            result.style.display = 'block';
        } catch (err) {
            error.textContent = 'Error -' + err.message;
            error.style.display = 'block';
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    document.getElementById('ticker').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') predict();
    });
</script>
